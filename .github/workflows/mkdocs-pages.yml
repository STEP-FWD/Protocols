# Builds the MkDocs site and deploys to GitHub Pages.
# Settings → Pages → Source: GitHub Actions.

name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - main
      - BT_conversion_test
    paths:
      - "YAML_STEP_Trial/**"
      - ".github/workflows/mkdocs-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml mkdocs mkdocs-material

      - name: Regenerate Markdown from YAML
        working-directory: YAML_STEP_Trial
        run: python import_yaml.py

      - name: Build static site
        working-directory: YAML_STEP_Trial
        run: mkdocs build --site-dir _mkdocs_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: YAML_STEP_Trial/_mkdocs_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
