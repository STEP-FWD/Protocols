# Regenerates Markdown, index.md, and mkdocs.yml from protocol YAML files
# using YAML_STEP_Trial/import_yaml.py. Protocol YAML must live directly under
# YAML_STEP_Trial/docs/ (see load_protocols() in import_yaml.py).

name: YAML to Markdown

on:
  push:
    paths:
      - "YAML_STEP_Trial/docs/*.yaml"
  workflow_dispatch:

concurrency:
  group: yaml-to-md-${{ github.ref }}
  cancel-in-progress: true

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate Markdown from YAML
        working-directory: YAML_STEP_Trial
        run: python import_yaml.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- YAML_STEP_Trial/docs YAML_STEP_Trial/mkdocs.yml
          if git diff --staged --quiet; then
            echo "No changes from import_yaml.py — nothing to commit."
          else
            git commit -m "chore: regenerate Markdown from protocol YAML"
            git push
          fi
